<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farm Road Trip 🌾</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: #111;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
      z-index: 1000;
    }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: -0.02em; }
    header .subtitle { font-size: 0.75rem; color: #888; margin-left: auto; }

    /* ── Map ── */
    #map {
      flex: 1;
      min-height: 0;
      cursor: crosshair;
    }

    /* ── Panel ── */
    #panel {
      flex-shrink: 0;
      background: #111;
      border-top: 1px solid #2a2a2a;
      padding: 14px 16px;
      min-height: 110px;
      transition: all 0.2s ease;
    }

    #panel.loading .crop-name::after {
      content: "";
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #444;
      border-top-color: #7ec8a0;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .panel-idle {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #555;
      font-size: 0.9rem;
    }

    .crop-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .crop-emoji {
      font-size: 2.4rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .crop-info { flex: 1; min-width: 0; }

    .crop-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: #f0f0f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .crop-category {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #7ec8a0;
      margin-top: 2px;
    }

    .crop-fact {
      font-size: 0.82rem;
      color: #aaa;
      margin-top: 6px;
      line-height: 1.4;
    }

    .crop-coords {
      font-size: 0.7rem;
      color: #555;
      margin-top: 6px;
      font-family: monospace;
    }

    .error-msg {
      color: #e07070;
      font-size: 0.85rem;
    }

    /* ── Map controls (override leaflet) ── */
    .leaflet-control-zoom a {
      background: #222 !important;
      color: #ccc !important;
      border-color: #333 !important;
    }
    .leaflet-control-zoom a:hover { background: #333 !important; }

    /* ── GPS button ── */
    #gps-btn {
      position: absolute;
      bottom: 130px;
      right: 10px;
      z-index: 800;
      background: #222;
      border: 1px solid #333;
      color: #ccc;
      border-radius: 4px;
      width: 34px;
      height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: background 0.15s;
    }
    #gps-btn:hover { background: #333; color: #fff; }
    #gps-btn.active { background: #1a4a2e; border-color: #7ec8a0; color: #7ec8a0; }

    /* ── Watch mode toggle ── */
    #watch-btn {
      position: absolute;
      bottom: 170px;
      right: 10px;
      z-index: 800;
      background: #222;
      border: 1px solid #333;
      color: #ccc;
      border-radius: 4px;
      width: 34px;
      height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: background 0.15s;
    }
    #watch-btn:hover { background: #333; color: #fff; }
    #watch-btn.active { background: #1a3a4a; border-color: #70a8e0; color: #70a8e0; }

    /* ── Tip ── */
    .map-tip {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 800;
      background: rgba(0,0,0,0.7);
      color: #aaa;
      font-size: 0.75rem;
      padding: 5px 12px;
      border-radius: 20px;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── CORS warning banner ── */
    #cors-warning {
      display: none;
      background: #2a1a0a;
      border-top: 1px solid #5a3a0a;
      color: #e0a060;
      font-size: 0.75rem;
      padding: 8px 16px;
      text-align: center;
    }
    #cors-warning a { color: #e0c070; }

    /* ── Location marker pulse ── */
    .location-pulse {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4a90d9;
      border: 2px solid white;
      box-shadow: 0 0 0 0 rgba(74,144,217,0.6);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(74,144,217,0.6); }
      70%  { box-shadow: 0 0 0 12px rgba(74,144,217,0); }
      100% { box-shadow: 0 0 0 0 rgba(74,144,217,0); }
    }
  </style>
</head>

</div>

<div id="cors-warning">
  ⚠️ CropScape API blocked by browser CORS policy.

<div id="panel">

    <span style="font-size:1.5rem">🗺️</span>

</div>

function decodeDWR(rawCode) {
  if (!rawCode) return null;
  const code = rawCode.trim().replace(/\*/g, "").toUpperCase();
  if (!code) return null;
  // Try full code first (e.g. "T4"), then class-only fallback (e.g. "T")
  return DWR_CODES[code] || DWR_CODES[code.charAt(0)] || null;
}

// ─────────────────────────────────────────────
// CALIFORNIA DWR CROP MAP (2023, field-level, 70+ specific crop types)
// Only used when lat/lng is within California bounds.
// ─────────────────────────────────────────────
function isInCalifornia(lat, lng) {
  return lat >= 32.5 && lat <= 42.1 && lng >= -124.5 && lng <= -114.1;
}

async function queryDWR(lat, lng) {
  const res = await fetch(`/dwr/query?lat=${lat}&lng=${lng}`);
  if (!res.ok) throw new Error(`DWR HTTP ${res.status}`);
  const json = await res.json();
  if (json.error) throw new Error(`DWR error: ${json.error.message}`);
  if (!json.features || json.features.length === 0) return null;

  const a = json.features[0].attributes;
  const mainCode = (a["MAIN_CROP"] || "").trim().replace(/\*/g, "");
  if (!mainCode) return null;

  // CROPTYP1 is the earlier-season crop on double-cropped fields
  const crop1Code = (a["CROPTYP1"] || "").trim().replace(/\*/g, "");

  return {
    mainCode,
    crop1Code: (crop1Code && crop1Code !== mainCode) ? crop1Code : null,
    isDoubleCrop: a["MULTIUSE"] === "D",
    county: a["COUNTY"] || "",
    acres: a["ACRES"] ? Math.round(a["ACRES"]) : null,
  };
}

function toTitleCase(str) {
  return str.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

// ─────────────────────────────────────────────
// CROPSCAPE API CLIENT
// ─────────────────────────────────────────────
const CDL_YEAR = 2024; // Most recent available; update annually

async function queryCropScape(lat, lng) {
  // CropScape uses EPSG:4326 (standard WGS84 lat/lng)
  // The API endpoint expects (x=longitude, y=latitude)
  // Route through local proxy to avoid CORS — see server.py
  // In production, swap /cropscape for a deployed proxy (Cloudflare Worker, Netlify Function, etc.)
  const url = `/cropscape/GetCDLValue?year=${CDL_YEAR}&x=${lng}&y=${lat}`;

  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);

  const text = await res.text();

  // Response XML contains a <Result> with a JSON-like object:
  // {x: ..., y: ..., value: 37, category: "Other Hay/Non Alfalfa", color: "#A5F58D"}
  const resultMatch = text.match(/<Result>([\s\S]*?)<\/Result>/i);
  if (!resultMatch) throw new Error(`Unexpected API response format:\n${text}`);

  const valueMatch = resultMatch[1].match(/value:\s*(\d+)/);
  if (!valueMatch) throw new Error(`No value in Result: ${resultMatch[1]}`);

  return parseInt(valueMatch[1]);
}

// Simple in-memory cache: "lat,lng" → result object
const cropCache = new Map();

async function getCropAt(lat, lng) {
  const key = `${lat.toFixed(4)},${lng.toFixed(4)}`;
  if (cropCache.has(key)) return cropCache.get(key);

  let result;

  // Tier 1: California DWR — field-level, 70+ specific crop types
  if (isInCalifornia(lat, lng)) {
    try {
      const dwr = await queryDWR(lat, lng);
      if (dwr) {
        result = { type: "dwr", ...dwr };
        cropCache.set(key, result);
        return result;
      }
    } catch (e) {
      console.warn("DWR lookup failed, falling back to CDL:", e.message);
    }
  }

  // Tier 2: USDA CDL — nationwide raster, 100+ categories
  const code = await queryCropScape(lat, lng);
  result = { type: "cdl", code };
  cropCache.set(key, result);
  return result;
}

const panel = document.getElementById("panel");
const corsWarning = document.getElementById("cors-warning");

function showLoading(lat, lng) {
  panel.className = "loading";
  panel.innerHTML = `
    <div class="crop-row">
      <div class="crop-emoji">🔍</div>
      <div class="crop-info">
        <div class="crop-name">Looking up crops…</div>
        <div class="crop-coords">${lat.toFixed(5)}, ${lng.toFixed(5)}</div>
      </div>
    </div>`;
}

function showCrop(lat, lng, result) {
  panel.className = "";

  let name, emoji, category, fact, source;

  if (result.type === "dwr") {
    const info = decodeDWR(result.mainCode) || { name: result.mainCode, emoji: "🌿", category: "Crop" };
    name     = info.name;
    emoji    = info.emoji;
    category = info.category;
    source   = "CA DWR 2023" + (result.county ? ` · ${result.county} County` : "");

    // Enrich with a fun fact from CDL if we have a name match
    const firstWord = name.split(/[\s/]/)[0].toLowerCase();
    const cdlMatch = Object.values(CROP_CODES).find(c => c.name.toLowerCase().includes(firstWord));
    fact = cdlMatch ? cdlMatch.fact : "";

    // Show earlier-season crop on double-cropped fields
    if (result.isDoubleCrop && result.crop1Code) {
      const crop1 = decodeDWR(result.crop1Code);
      if (crop1) fact = `${crop1.emoji} Earlier this season: ${crop1.name}. ` + fact;
    }
  } else {
    const crop = getCropInfo(result.code);
    name     = crop.name;
    emoji    = crop.emoji;
    category = crop.category;
    fact     = crop.fact;
    source   = `USDA CDL ${CDL_YEAR}`;
  }

  panel.innerHTML = `
    <div class="crop-row">
      <div class="crop-emoji">${emoji}</div>
      <div class="crop-info">
        <div class="crop-name">${name}</div>
        <div class="crop-category">${category} · ${source}</div>
        ${fact ? `<div class="crop-fact">${fact}</div>` : ""}
        <div class="crop-coords">${lat.toFixed(5)}, ${lng.toFixed(5)}</div>
      </div>
    </div>`;
}

function showError(lat, lng, err) {
  panel.className = "";
  const isCors = err.message && (err.message.includes("Failed to fetch") || err.message.includes("NetworkError") || err.message.includes("CORS"));
  if (isCors) corsWarning.style.display = "block";
  const coordsHtml = (lat != null && lng != null)
    ? `<div class="crop-coords">${lat.toFixed(5)}, ${lng.toFixed(5)}</div>` : "";
  panel.innerHTML = `
    <div class="crop-row">
      <div class="crop-emoji">⚠️</div>
      <div class="crop-info">
        <div class="crop-name error-msg">${isCors ? "CORS error — serve via a local server" : "Error"}</div>
        <div class="crop-fact error-msg">${err.message}</div>
        ${coordsHtml}
      </div>
    </div>`;
}

const map = L.map("map", {

// Dark basemap tile layer (CartoDB Dark Matter)
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a> | Crop data: USDA NASS CDL',
  subdomains: "abcd",
  maxZoom: 19,
}).addTo(map);

// Click marker
let clickMarker = null;

function placeMarker(lat, lng) {
  if (clickMarker) map.removeLayer(clickMarker);
  clickMarker = L.circleMarker([lat, lng], {
    radius: 8,
    fillColor: "#7ec8a0",
    color: "#fff",
    weight: 2,
    fillOpacity: 0.9,
  }).addTo(map);
}

// GPS location marker (pulsing blue dot)
let gpsMarker = null;

function placeGpsMarker(lat, lng) {
  if (gpsMarker) map.removeLayer(gpsMarker);
  const icon = L.divIcon({
    className: "",
    html: '<div class="location-pulse"></div>',
    iconSize: [16, 16],
    iconAnchor: [8, 8],
  });
  gpsMarker = L.marker([lat, lng], { icon }).addTo(map);
}

// On map click: query that location
map.on("click", async (e) => {
  const { lat, lng } = e.latlng;
  placeMarker(lat, lng);
  showLoading(lat, lng);
  try {
    const code = await getCropAt(lat, lng);
    showCrop(lat, lng, code);
  } catch (err) {
    showError(lat, lng, err);
  }
});

// ─────────────────────────────────────────────
// GPS BUTTON
// ─────────────────────────────────────────────
const gpsBtn = document.getElementById("gps-btn");

gpsBtn.addEventListener("click", () => {
  if (!navigator.geolocation) {
    alert("Geolocation is not supported by your browser.");
    return;
  }
  gpsBtn.textContent = "⏳";
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      gpsBtn.textContent = "📍";
      gpsBtn.classList.add("active");
      const { latitude: lat, longitude: lng } = pos.coords;
      map.setView([lat, lng], 13);
      placeGpsMarker(lat, lng);
      placeMarker(lat, lng);
      showLoading(lat, lng);
      try {
        const result = await getCropAt(lat, lng);
        showCrop(lat, lng, result);
      } catch (err) {
        showError(lat, lng, err);
      }
    },
    (err) => {
      gpsBtn.textContent = "📍";
      alert("Could not get location: " + err.message);
    },
    { enableHighAccuracy: true }
  );
});

// ROAD TRIP MODE (watchPosition)
// ─────────────────────────────────────────────
const watchBtn = document.getElementById("watch-btn");
let watchId = null;
let lastWatchLat = null;
let lastWatchLng = null;
const MIN_DISTANCE_DEG = 0.001; // ~100m before re-querying

function deg2rad(d) { return d * Math.PI / 180; }
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = deg2rad(lat2 - lat1);
  const dLng = deg2rad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function startWatching() {
  watchId = navigator.geolocation.watchPosition(
    async (pos) => {
      const { latitude: lat, longitude: lng } = pos.coords;
      placeGpsMarker(lat, lng);
      map.setView([lat, lng], 13);

      if (lastWatchLat !== null) {
        const dist = haversine(lastWatchLat, lastWatchLng, lat, lng);
        if (dist < 0.1) return; // Less than ~100m, skip
      }
      lastWatchLat = lat;
      lastWatchLng = lng;

      placeMarker(lat, lng);
      showLoading(lat, lng);
      try {
        const result = await getCropAt(lat, lng);
        showCrop(lat, lng, result);
      } catch (err) {
        showError(lat, lng, err);
      }
    },
    (err) => {
      watchBtn.classList.remove("active");
      watchBtn.textContent = "🚗";
      watchId = null;
      const msg = err.code === 1
        ? "Location access denied. Allow it in your browser settings and try again."
        : err.message;
      showError(null, null, new Error(msg));
    },
    { enableHighAccuracy: true, maximumAge: 5000 }
  );
}

watchBtn.addEventListener("click", () => {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
    lastWatchLat = null;
    lastWatchLng = null;
    watchBtn.classList.remove("active");
    watchBtn.textContent = "🚗";
    watchBtn.title = "Road trip mode: track my location";
    return;
  }

  if (!navigator.geolocation) {
    showError(null, null, new Error("Geolocation is not supported by this browser."));
    return;
  }

  // Use getCurrentPosition first — this immediately triggers the browser's
  // location permission dialog as a direct response to the tap, which browsers
  // require. Once permission is granted and we have the first fix, switch to
  // watchPosition for continuous road-trip tracking.
  watchBtn.textContent = "⏳";
  panel.className = "";
  panel.innerHTML = `<div class="panel-idle"><span style="font-size:1.5rem">📍</span>
    <span>Tap <strong>Allow</strong> when your browser asks for location…</span></div>`;

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      watchBtn.classList.add("active");
      watchBtn.textContent = "🚗";
      watchBtn.title = "Tap to stop tracking";

      const { latitude: lat, longitude: lng } = pos.coords;
      map.setView([lat, lng], 13);
      placeGpsMarker(lat, lng);
      placeMarker(lat, lng);
      showLoading(lat, lng);

      // Look up the first position, then hand off to watchPosition
      getCropAt(lat, lng)
        .then(result => showCrop(lat, lng, result))
        .catch(err   => showError(lat, lng, err));

      startWatching();
    },
    (err) => {
      watchBtn.textContent = "🚗";
      const msg = err.code === 1
        ? "Location access denied. Allow it in your browser settings and try again."
        : err.message;
      showError(null, null, new Error(msg));
    },
    { enableHighAccuracy: true, timeout: 15000 }
  );
});
</script>
</body>
</html>
